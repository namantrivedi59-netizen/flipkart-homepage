<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - UrbanCart</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>
<body>

<header>
    <div class="logo">
        <a href="index.html">
            <h1>UrbanCart</h1>
        </a>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Search for products, brands and more">
        <button>
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>
</header>

<div class="login-container">

    <div class="login-card">

        <h1>Sign In</h1>

        <p class="login-text">
            Welcome Back! Sign in to continue shopping.
        </p>

        <form id="loginForm">

            <label>Email</label>

            <input
            type="email" id="email"placeholder="Enter your email"required>
            <label>Password</label>

            <input type="password" id="password" placeholder="Enter your password"required>
            <label>CAPTCHA</label>

           <div class="captcha-box">

                <span id="captchaText">AB12C</span>

                <button type="button" id="refreshCaptcha">Refresh</button>
            </div>

            <input type="text" id="captchaInput" placeholder="Enter CAPTCHA" required>

            <p id="message"></p>

            <a href="forgot-password.html" class="forgot-password">
    Forgot Password?
</a>

            <button type="submit" class="login-submit" id="loginBtn">
                Sign In
            </button>

        </form>

        <p class="register-link">

            New Customer?

            <a href="register.html">
                Create your Account
            </a>

        </p>

    </div>

</div>
<script src="js/script.js"></script>

</body>
</html>
